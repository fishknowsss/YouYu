name: Build Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - vc

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build installer
        run: npm run dist:win

      - name: Smoke packaged output
        run: npm run smoke

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: youyu-windows
          path: release/*.exe
